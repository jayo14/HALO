services:
  - type: web
    name: halo-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: "False"
      - fromDatabase:
          name: halo-db
          property: connectionString
        key: DATABASE_URL

databases:
  - name: halo-db
    databaseName: halo
    plan: free
